<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAZA SHOP</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f8f5f0;
    color:#5a4a42;
}

header{
    background:#e8dfd3;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:20px;
}

.product{
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    transition:.3s;
}
.product:hover{transform:scale(1.03)}

button{
    background:#d6c3a3;
    border:none;
    padding:8px;
    cursor:pointer;
    border-radius:5px;
}

.cart{
    position:fixed;
    right:0;
    top:0;
    width:320px;
    height:100%;
    background:white;
    box-shadow:-3px 0 10px rgba(0,0,0,0.2);
    transform:translateX(100%);
    transition:.3s;
    padding:10px;
    overflow:auto;
}
.cart.active{transform:translateX(0)}

.item{
    border-bottom:1px solid #ddd;
    padding:5px;
    font-size:14px;
}

input{
    width:95%;
    padding:8px;
    margin:5px 0;
}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#5a4a42;
    color:white;
    padding:10px;
    display:none;
}
</style>
</head>

<body>

<header>
<h2>🧵 ZAZA SHOP</h2>
<button onclick="toggleCart()">🛒 (<span id="count">0</span>)</button>
</header>

<!-- PRODUCTS -->
<div class="products">

<div class="product">
<h3>Torba handmade</h3>
<p>25 KM</p>
<button onclick="add('Torba',25)">Dodaj</button>
</div>

<div class="product">
<h3>Jastuk dekor</h3>
<p>20 KM</p>
<button onclick="add('Jastuk',20)">Dodaj</button>
</div>

<div class="product">
<h3>Torbica</h3>
<p>15 KM</p>
<button onclick="add('Torbica',15)">Dodaj</button>
</div>

</div>

<!-- CART -->
<div class="cart" id="cart">

<h2>Korpa</h2>

<div id="items"></div>

<h3>Checkout</h3>

<input id="name" placeholder="Ime">
<input id="address" placeholder="Adresa">
<input id="phone" placeholder="Telefon">

<h3>Ukupno: <span id="total">0</span> KM</h3>

<button onclick="order()">Naruči</button>

</div>

<div class="toast" id="toast">Dodano</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

function add(name,price){
    cart.push({name,price});
    save();
    update();
    toast();
}

function update(){

    document.getElementById("count").innerText = cart.length;

    let items = document.getElementById("items");
    items.innerHTML = "";

    let total = 0;

    cart.forEach((c,i)=>{
        total += c.price;

        items.innerHTML += `
        <div class="item">
        ${c.name} - ${c.price} KM
        </div>`;
    });

    document.getElementById("total").innerText = total;
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
}

function toast(){
    let t = document.getElementById("toast");
    t.style.display="block";
    setTimeout(()=>t.style.display="none",1200);
}

/* 🔥 MAX ORDER SYSTEM */
function order(){

    if(cart.length === 0){
        alert("Korpa je prazna!");
        return;
    }

    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let phone = document.getElementById("phone").value;

    let total = 0;
    let msg = "🧵 ZAZA NARUDŽBA%0A%0A";

    msg += "Ime: " + name + "%0A";
    msg += "Adresa: " + address + "%0A";
    msg += "Telefon: " + phone + "%0A%0A";

    cart.forEach(c=>{
        msg += "- " + c.name + " (" + c.price + " KM)%0A";
        total += c.price;
    });

    msg += "%0AUKUPNO: " + total + " KM";

    /* 📱 WHATSAPP */
    let broj = "3876XXXXXXX"; // 🔴 TVOJ BROJ
    window.open("https://wa.me/" + broj + "?text=" + msg, "_blank");

    /* 📊 GOOGLE SHEETS (API) */
    fetch("https://script.google.com/macros/s/YOUR_SCRIPT_URL/exec", {
        method:"POST",
        body:JSON.stringify({
            name,address,phone,cart,total
        })
    });

    cart = [];
    save();
    update();
}

update();

</script>

</body>
</html>
