<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAZA SHOP</title>

<style>
body{margin:0;font-family:Arial;background:#f8f5f0}

header{
background:#e8dfd3;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

button{
background:#d6c3a3;
border:none;
padding:6px;
margin:3px;
cursor:pointer;
}

.cart{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:white;
transform:translateX(100%);
transition:.3s;
padding:10px;
overflow:auto;
}

.cart.active{transform:translateX(0)}

.admin{
background:white;
padding:10px;
margin:10px;
display:none;
}

input{
width:95%;
padding:8px;
margin:5px 0;
}
</style>
</head>

<body>

<header>
<h2>🧵 ZAZA SHOP</h2>
<div>
<button onclick="toggleCart()">🛒 (<span id="count">0</span>)</button>
<button onclick="toggleAdmin()">⚙️</button>
</div>
</header>

<div class="products" id="products"></div>

<div class="cart" id="cart">
<h2>Korpa</h2>
<div id="items"></div>

<h3>Ukupno: <span id="total">0</span> KM</h3>

<input id="name" placeholder="Ime">
<input id="address" placeholder="Adresa">
<input id="phone" placeholder="Telefon">

<button onclick="order()">Naruči WhatsApp</button>
</div>

<div class="admin" id="admin">
<h3>Admin (dodaj proizvod)</h3>

<input id="pname" placeholder="Naziv">
<input id="pprice" placeholder="Cijena">
<input id="pimg" placeholder="Link slike">

<button onclick="addProduct()">Dodaj</button>
</div>

<script>

// ===== PROIZVODI =====
let products = [
{
name:"Torba handmade",
price:25,
img:"https://images.unsplash.com/photo-1590874103328-eac38a683ce7"
},
{
name:"Jastuk dekor",
price:20,
img:"https://images.unsplash.com/photo-1582582429416-7a1cfdc9a1d1"
},
{
name:"Torbica",
price:15,
img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba6"
}
];

function renderProducts(){
let box = document.getElementById("products");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML += `
<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} KM</p>
<button onclick="add(${i})">Dodaj</button>
</div>`;
});
}

// ===== KORPA =====
let cart = [];

function add(i){
let item = cart.find(x=>x.name===products[i].name);

if(item){
item.qty++;
}else{
cart.push({...products[i], qty:1});
}

update();
}

function update(){
document.getElementById("count").innerText = cart.length;

let items = document.getElementById("items");
items.innerHTML="";

let total = 0;

cart.forEach((c,i)=>{
total += c.price*c.qty;

items.innerHTML += `
<div>
${c.name} (${c.qty})
<button onclick="change(${i},1)">+</button>
<button onclick="change(${i},-1)">-</button>
<button onclick="removeItem(${i})">X</button>
</div>`;
});

document.getElementById("total").innerText = total;
}

function change(i,d){
cart[i].qty += d;
if(cart[i].qty<=0) cart.splice(i,1);
update();
}

function removeItem(i){
cart.splice(i,1);
update();
}

// ===== ADMIN =====
function toggleAdmin(){
let a = document.getElementById("admin");
a.style.display = a.style.display==="none"?"block":"none";
}

function addProduct(){
let name = document.getElementById("pname").value;
let price = parseFloat(document.getElementById("pprice").value);
let img = document.getElementById("pimg").value;

products.push({name,price,img});
renderProducts();
alert("Dodano!");
}

// ===== CART =====
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

// ===== WHATSAPP ORDER =====
function order(){

if(cart.length===0){
alert("Korpa je prazna!");
return;
}

let msg="ZAZA NARUDŽBA%0A%0A";
let total=0;

cart.forEach(c=>{
msg += c.name+" x"+c.qty+"%0A";
total += c.price*c.qty;
});

msg += "%0AUKUPNO: "+total+" KM";

window.open("https://wa.me/3876XXXXXXX?text="+msg,"_blank");

cart=[];
update();
}

// INIT
renderProducts();
update();

</script>

</body>
</html>
